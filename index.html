        { label:"周六 · 复习日", color:"#4ade80", bg:"#052e16", total:"约5.5h", rules:[
          "不学新内容，只复习本周所学",
          "重做错题，查找薄弱点",
          "做一篇完整英语阅读真题（计时）",
          "写周总结：3个收获 + 3个待解决问题",
          "下午可以自由安排，运动/社交都行"
        ]},
        { label:"周日 · 恢复日", color:"#f87171", bg:"#2d0707", total:"约2.5h（轻量）", rules:[
          "以休息为主，不强迫自己完成目标",
          "只做轻松的事：看视频、背背单词",
          "运动优先！跑步、散步都行",
          "晚上10分钟预习明天章节标题即可",
          "早睡，为下周蓄力"
        ]},
        { label:"每月节奏", color:"#c084fc", bg:"#1a0a2d", total:"约195h/月", rules:[
          "第1-2周：正常推进新内容",
          "第3周：冲刺周，可适当加量",
          "第4周：复盘周，以整理笔记为主",
          "每月末做一次月度总结：哪科进步了？哪科还差？",
          "每月给自己一个完整休息日（旅游/聚会都行）"
        ]}
      ].map(block=>`
      <div style="background:${block.bg};border:1px solid ${block.color}44;border-radius:12;padding:14px;margin-bottom:10">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10">
          <span style="font-size:13;font-weight:700;color:${block.color}">${block.label}</span>
          <span style="font-size:11;color:${block.color};background:${block.color}22;padding:2px 8px;border-radius:20;border:1px solid ${block.color}44">${block.total}</span>
        </div>
        ${block.rules.map(r=>`
        <div style="display:flex;gap:6;margin-bottom:6">
          <span style="color:${block.color};flex-shrink:0;font-size:13">›</span>
          <span style="font-size:13;color:#94a3b8;line-height:1.6">${r}</span>
        </div>
        `).join('')}
      </div>
      `).join('')}
    </div>
    `;
  }

  // 总体规划
  if(tab === "plan") {
    html += `
    <div style="padding:16px 14px">
      <p style="font-size:12;color:#64748b;margin-bottom:12;line-height:1.7">
        共 <span style="color:#f0f6ff">3个阶段</span>，点击展开
      </p>
      ${phases.map(phase=>`
      <div style="margin-bottom:10">
        <button onclick="togglePhase(${phase.id})" style="width:100%;background:${openPhase===phase.id?phase.bg:"#0e1824"};border:1px solid ${openPhase===phase.id?phase.color:"#1e293b"};border-radius:${openPhase===phase.id?"12px 12px 0 0":"12px"};padding:13px 14px;cursor:pointer;text-align:left;font-family:inherit">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-size:10;color:${phase.color};letter-spacing:1;font-weight:700">${phase.label} · ${phase.period}</div>
              <div style="font-size:16;font-weight:800;color:#f0f6ff;margin-top:2">${phase.theme}</div>
            </div>
            <div style="color:${phase.color};font-size:12;flex-shrink:0">${openPhase===phase.id?"▲":"▼"}</div>
          </div>
          <div style="font-size:11;color:#64748b;margin-top:3">${phase.weeks} · ${phase.desc}</div>
        </button>
        ${openPhase===phase.id?`
        <div style="background:${phase.bg};border:1px solid ${phase.color};border-top:none;border-radius:0 0 12px 12px;padding:0 13px 13px">
          ${phase.subjects.map(sub=>`
          <div style="background:rgba(0,0,0,0.3);border-radius:9;padding:10px 12px;margin-top:10;border-left:3px solid ${phase.color}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6">
              <span style="font-size:14;font-weight:700;color:#e2e8f0">${sub.icon} ${sub.name}</span>
              <span style="font-size:11;color:${phase.color};background:${phase.color}22;padding:2px 8px;border-radius:20;border:1px solid ${phase.color}44">每日 ${sub.daily}</span>
            </div>
            <ul style="margin:0;padding-left:14">
              ${sub.tasks.map(t=>`<li style="font-size:12;color:#94a3b8;margin-bottom:4;line-height:1.6">${t}</li>`).join('')}
            </ul>
          </div>
          `).join('')}
          <div style="margin-top:10;padding:8px 11px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.3);border-radius:8;font-size:12;color:#fbbf24">
            ⚠ ${phase.warning}
          </div>
        </div>
        `:''}
      </div>
      `).join('')}

      <div style="background:linear-gradient(135deg,#0f2d1a,#061810);border:1px solid #4ade8055;border-radius:12;padding:16px;text-align:center;margin-top:6">
        <div style="font-size:20;margin-bottom:6">💪</div>
        <div style="font-size:13;color:#4ade80;font-weight:700;margin-bottom:4">凡事皆有可能，坚持就是胜利</div>
        <div style="font-size:11;color:#64748b;line-height:1.8">
          高数学过+高中数学扎实，是最理想的起点之一。武忠祥基础班对你来说是"唤醒"而非"从零"，进度会比你想象的快！
        </div>
      </div>
    </div>
    `;
  }

  html += `</div>`;
  root.innerHTML = html;
}

// 全局方法
window.switchTab = function(k) {
  tab = k;
  render();
};
window.switchDay = function(i) {
  dayIdx = i;
  render();
};
window.togglePhase = function(id) {
  openPhase = openPhase === id ? null : id;
  render();
};

// 初始渲染
render();
</script>
</body>
</html>
